name: Sync Zephyr Docs

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated Zephyr tags (example: v3.5.0,v3.6.0)"
        required: true
        type: string
      source_url_template:
        description: "Source URL template; use {version} placeholder"
        required: false
        default: "https://docs.zephyrproject.org/{version}"
        type: string
      zephyr_repo:
        description: "Zephyr source repository"
        required: false
        default: "https://github.com/zephyrproject-rtos/zephyr.git"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: sync-zephyr-docs-${{ github.ref }}
  cancel-in-progress: false

env:
  ZEPHYR_BUILD_IMAGE: ghcr.io/zephyrproject-rtos/zephyr-build:latest
  ZEPHYR_SDK_VERSION: "0.16.8"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.collect.outputs.tags_json }}
      tags_csv: ${{ steps.collect.outputs.tags_csv }}
      latest_tag: ${{ steps.collect.outputs.latest_tag }}
      source_url_template: ${{ steps.collect.outputs.source_url_template }}
      zephyr_repo: ${{ steps.collect.outputs.zephyr_repo }}
    steps:
      - name: Collect requested tags
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            RAW_TAGS="${GITHUB_REF_NAME}"
          else
            RAW_TAGS="${{ inputs.tags }}"
          fi

          CLEANED=$(printf '%s' "$RAW_TAGS" | tr ',;' '\n' | sed 's/^ *//;s/ *$//' | sed '/^$/d' | sort -u)
          if [[ -z "$CLEANED" ]]; then
            echo "No valid tags were provided"
            exit 1
          fi

          TAGS_CSV=$(printf '%s' "$CLEANED" | paste -sd, -)
          TAGS_JSON=$(printf '%s\n' "$CLEANED" | jq -Rsc 'split("\n") | map(select(length>0))')
          LATEST=$(printf '%s\n' "$CLEANED" | sort -V | tail -n1)

          if [[ "${{ github.event_name }}" == "push" ]]; then
            SOURCE_TEMPLATE="https://docs.zephyrproject.org/{version}"
            ZEPHYR_REPO="https://github.com/zephyrproject-rtos/zephyr.git"
          else
            SOURCE_TEMPLATE="${{ inputs.source_url_template }}"
            ZEPHYR_REPO="${{ inputs.zephyr_repo }}"
          fi

          echo "tags_json=$TAGS_JSON" >> "$GITHUB_OUTPUT"
          echo "tags_csv=$TAGS_CSV" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "source_url_template=$SOURCE_TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "zephyr_repo=$ZEPHYR_REPO" >> "$GITHUB_OUTPUT"

  build-and-convert:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.prepare.outputs.tags_json) }}
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: docker-${{ env.ZEPHYR_BUILD_IMAGE }}
          restore-keys: docker-

      - name: Pull zephyr-build image
        run: |
          set -euo pipefail
          # Try to load from cache first
          if [[ -f /tmp/.docker-cache/zephyr-build.tar ]]; then
            echo "Loading image from cache..."
            docker load -i /tmp/.docker-cache/zephyr-build.tar
          else
            echo "Pulling fresh image..."
            docker pull "$ZEPHYR_BUILD_IMAGE"
          fi
          # Save image to cache for next run
          mkdir -p /tmp/.docker-cache
          docker save -o "/tmp/.docker-cache/zephyr-build.tar" "$ZEPHYR_BUILD_IMAGE" || true

      - name: Clone Zephyr source at tag
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ matrix.tag }}" "${{ needs.prepare.outputs.zephyr_repo }}" zephyr-src

      - name: Build Zephyr docs and convert to Markdown
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ matrix.tag }}"
          VERSION="${TAG#v}"
          SOURCE_TEMPLATE="${{ needs.prepare.outputs.source_url_template }}"
          SOURCE_URL="${SOURCE_TEMPLATE//\{version\}/$VERSION}"

          mkdir -p "$PWD/artifacts/$TAG"

          docker run --rm \
            -v "$PWD/zephyr-src:/work/zephyr" \
            -v "$PWD:/work/pipeline" \
            -w /work/pipeline \
            -e TAG="$TAG" \
            -e SOURCE_URL="$SOURCE_URL" \
            -e ZEPHYR_SDK_VERSION="$ZEPHYR_SDK_VERSION" \
            "$ZEPHYR_BUILD_IMAGE" \
            bash -lc '
              set -euo pipefail

              WEST_WS="/tmp/west-workspace"
              rm -rf "$WEST_WS"
              mkdir -p "$WEST_WS"
              west init -l --mf /work/zephyr/west.yml "$WEST_WS"
              cd "$WEST_WS"

              python3 --version
              cmake --version
              ninja --version

              python3 -m pip install --upgrade pip
              python3 -m pip install --upgrade west

              west update

              python3 -m pip install --upgrade -r doc/requirements.txt
              python3 -m pip install --upgrade -r /work/pipeline/scripts/requirements-convert.txt

              if [[ -z "${ZEPHYR_SDK_INSTALL_DIR:-}" || ! -d "${ZEPHYR_SDK_INSTALL_DIR}" ]]; then
                SDK_DIR="/opt/zephyr-sdk-${ZEPHYR_SDK_VERSION}"
                if [[ ! -d "$SDK_DIR" ]]; then
                  SDK_ARCHIVE="zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz"
                  SDK_URL="https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/${SDK_ARCHIVE}"
                  curl -fsSL "$SDK_URL" -o "/tmp/${SDK_ARCHIVE}"
                  mkdir -p /opt
                  tar -C /opt -xf "/tmp/${SDK_ARCHIVE}"
                  "$SDK_DIR/setup.sh" -c -h
                fi
                export ZEPHYR_SDK_INSTALL_DIR="$SDK_DIR"
              fi

              cmake -GNinja -B zephyr/doc/_build -S zephyr/doc -DDOC_TAG="$TAG" -DSPHINXOPTS="-j auto -W --keep-going -T"
              cmake --build zephyr/doc/_build --target html

              python3 /work/pipeline/scripts/convert.py \
                --input-html-root "$WEST_WS/zephyr/doc/_build/html" \
                --output-root "/work/pipeline/artifacts/$TAG" \
                --version "$TAG" \
                --base-source-url "$SOURCE_URL" \
                --clean
            '

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-${{ matrix.tag }}
          path: artifacts/${{ matrix.tag }}

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-convert
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all converted artifacts
        uses: actions/download-artifact@v4
        with:
          path: _downloaded

      - name: Merge generated versions
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p versions
          IFS=',' read -r -a TAG_ARRAY <<< "${{ needs.prepare.outputs.tags_csv }}"

          for TAG in "${TAG_ARRAY[@]}"; do
            SRC_DIR="_downloaded/markdown-${TAG}"
            if [[ ! -d "$SRC_DIR" ]]; then
              echo "Missing artifact for $TAG"
              exit 1
            fi

            DEST_DIR="versions/$TAG"
            rm -rf "$DEST_DIR"
            mkdir -p "$DEST_DIR"
            cp -R "$SRC_DIR"/. "$DEST_DIR"/
          done

          LATEST="${{ needs.prepare.outputs.latest_tag }}"
          rm -rf versions/latest
          mkdir -p versions/latest
          cp -R "versions/$LATEST"/. versions/latest/

      - name: Regenerate versions index
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t VERSION_DIRS < <(find versions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^latest$' | sort -V)

          if [[ ${#VERSION_DIRS[@]} -eq 0 ]]; then
            echo "No version directories found"
            exit 1
          fi

          LAST_INDEX=$((${#VERSION_DIRS[@]} - 1))
          LATEST="${VERSION_DIRS[$LAST_INDEX]}"

          {
            echo '{'
            echo "  \"latest\": \"$LATEST\"," 
            echo '  "versions": ['
            for i in "${!VERSION_DIRS[@]}"; do
              v="${VERSION_DIRS[$i]}"
              comma=','
              if [[ "$i" -eq $((${#VERSION_DIRS[@]} - 1)) ]]; then
                comma=''
              fi
              echo "    \"$v\"$comma"
            done
            echo '  ]'
            echo '}'
          } > versions/versions.json

      - name: Validate generated markdown
        shell: bash
        run: |
          set -euo pipefail

          if ! find versions -type f -name '*.md' | grep -q .; then
            echo "No markdown files found in versions/"
            exit 1
          fi

          python3 - <<'PY'
            import textwrap

            exec(
              textwrap.dedent(
                """
                import pathlib
                import re

                required = ["version:", "source_url:", "original_path:"]
                link_pattern = re.compile(r"\\[[^\\]]*\\]\\(([^)]+)\\)")

                for path in pathlib.Path("versions").rglob("*.md"):
                  text = path.read_text(encoding="utf-8", errors="ignore")
                  if not text.startswith("---\\n"):
                    raise SystemExit(f"Missing front matter in {path}")
                  for key in required:
                    if key not in text.split("---\\n", 2)[1]:
                      raise SystemExit(f"Missing {key} in {path}")

                  for match in link_pattern.finditer(text):
                    target = match.group(1).split(" ", 1)[0].strip()
                    if target.startswith(("http://", "https://", "mailto:", "tel:", "#")):
                      continue
                    if ".html" in target:
                      raise SystemExit(f"Unresolved internal HTML link in {path}: {target}")

                print("Front matter validation passed")
                """
              )
            )
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add versions

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs: sync zephyr markdown for ${{ needs.prepare.outputs.tags_csv }}"
          git push
